name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────
  # STAGE 1: LINT
  # ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python - API
        run: flake8 api/main.py --max-line-length=100

      - name: Lint Python - Worker
        run: flake8 worker/worker.py --max-line-length=100

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Lint JavaScript
        run: |
          cd frontend
          npm run lint

      - name: Lint Dockerfiles with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          failure-threshold: error

      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile
          failure-threshold: error

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: error

  # ─────────────────────────────────────────
  # STAGE 2: TEST
  # ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          pip install fastapi==0.104.1 uvicorn==0.24.0 redis==5.0.8
          pip install pytest pytest-cov httpx

      - name: Run tests
        run: |
          cd api
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/htmlcov/

  # ─────────────────────────────────────────
  # STAGE 3: BUILD
  # ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest

  # ─────────────────────────────────────────
  # STAGE 4: SECURITY SCAN
  # ─────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Rebuild images for scanning
        run: |
          docker build -t localhost:5000/api:latest ./api
          docker build -t localhost:5000/worker:latest ./worker
          docker build -t localhost:5000/frontend:latest ./frontend

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/api:latest
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: '1'

      - name: Scan Worker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/worker:latest
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: '1'

      - name: Scan Frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/frontend:latest
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: '1'

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: |
            trivy-api.sarif
            trivy-worker.sarif
            trivy-frontend.sarif

  # ─────────────────────────────────────────
  # STAGE 5: INTEGRATION TEST
  # ─────────────────────────────────────────
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "REDIS_PASSWORD=testpassword123" >> .env
          echo "APP_ENV=production" >> .env
          echo "API_URL=http://api:8000" >> .env

      - name: Start full stack
        run: docker compose up --build -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services..."
          sleep 30
          docker compose ps

      - name: Submit a job and verify completion
        run: |
          # Submit a job through the frontend
          JOB_RESPONSE=$(curl -s -X POST http://localhost:3000/submit)
          echo "Job response: $JOB_RESPONSE"

          # Extract job ID
          JOB_ID=$(echo $JOB_RESPONSE | python3 -c "import sys, json; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"

          # Poll until completed or timeout
          MAX_ATTEMPTS=15
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            STATUS_RESPONSE=$(curl -s http://localhost:3000/status/$JOB_ID)
            STATUS=$(echo $STATUS_RESPONSE | python3 -c "import sys, json; print(json.load(sys.stdin)['status'])")
            echo "Attempt $ATTEMPT: Status = $STATUS"

            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully!"
              exit 0
            fi

            ATTEMPT=$((ATTEMPT + 1))
            sleep 2
          done

          echo "Job did not complete in time!"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────
  # STAGE 6: DEPLOY
  # ─────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: hngdevops
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/hngdevops/hng14-stage2-devops

            # Pull latest code
            git pull origin main

            # Create .env file on server
            echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" > .env
            echo "APP_ENV=production" >> .env

            # Rolling update - build new images
            docker compose pull || true
            docker compose up --build -d --no-deps api
            
            # Wait for api health check to pass
            TIMEOUT=60
            ELAPSED=0
            while [ $ELAPSED -lt $TIMEOUT ]; do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' hng14-stage2-devops-api-1 2>/dev/null)
              echo "API health: $STATUS (${ELAPSED}s)"
              if [ "$STATUS" = "healthy" ]; then
                echo "API is healthy - continuing rolling update"
                break
              fi
              if [ $ELAPSED -eq $((TIMEOUT-5)) ]; then
                echo "Health check failed - aborting deploy"
                docker compose up -d --no-deps api
                exit 1
              fi
              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done

            # Update remaining services
            docker compose up --build -d --no-deps worker
            docker compose up --build -d --no-deps frontend

            echo "Deploy complete!"
            docker compose ps